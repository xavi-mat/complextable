    function generateStudentName(index) {
      var first = FIRST_NAMES[index % FIRST_NAMES.length];
      var last = LAST_NAMES[index % LAST_NAMES.length];
      var cycle = Math.floor(index / FIRST_NAMES.length);
      if (cycle > 0) {
        return last + ', ' + first + ' ' + String.fromCharCode(65 + cycle);
      }
      return last + ', ' + first;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;

    function getHeaders() {
      const headers = [];
      // First column, button
      headers.push({
        pos: 'left',
        content: "<button>Seleccionar grupos</button>"
      });
      // Assignment columns
      for (var a = 0; a < NUM.ASSIGNMENTS; a++) {
        headers.push({
          pos: 'center',
          content: `<img src="icon.svg" alt="Icon"><p>Unidad ${a + 1}</p>`
        });
      }
      // Two average columns
      headers.push({
        pos: 'right',
        content: '<p>Media</p>'
      });
      headers.push({
        pos: 'right',
        content: '<p>Media ponderada<sup>*</sup></p>'
      });

      return headers;
    }

    function getGroup(groupIndex) {
      const group = [];
      // Group first row: group name + empty cells
      const groupName = 'Grupo ' + (groupIndex + 1);
      const groupHeader = [{pos: 'left', content: groupName}];
      for (let i = 1; i < NUM.ASSIGNMENTS; i++) {
        groupHeader.push({pos: 'center', content: ''});
      }
      groupHeader.push({pos: 'right', content: ''});
      groupHeader.push({pos: 'right', content: ''});

      group.push(groupHeader);

      // First column: names
      // Columns 2-ASSIGNMENTS+1: scores
      // Last two columns: average and Weighted average

      for (let i = 0; i < NUM.STUDENTS_PER_GROUP; i++) {
        const student = [];
        student.push({
          pos: 'left',
          content: generateStudentName(i)
        });
        for (let j = 0; j < NUM.ASSIGNMENTS; j++) {
          student.push({
            pos: 'center',
            content: randomInt(45, 100)
          });
        }
        student.push({pos: 'right', content: randomInt(45, 100)});
        student.push({pos: 'right', content: randomInt(45, 100)});
        group.push(student);
      }
      return group;
    }

    function getGroups() {
      const groups = [];
      for (let g = 0; g < NUM.GROUPS; g++) {
        groups.push(getGroup(g));
      }
      return groups;
    }
